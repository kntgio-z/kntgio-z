<svg viewBox="0 0 1080 430" xmlns="http://www.w3.org/2000/svg" font-family="'DejaVu Sans Mono', Menlo, Consolas, monospace">
  <defs>
    <filter id="neonGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feMorphology operator="dilate" radius="1.2" in="SourceAlpha" result="thick1"/>
      <feGaussianBlur in="thick1" stdDeviation="9" result="blur1"/>
      <feFlood flood-color="#ff2fd0" flood-opacity="0.85" result="color1"/>
      <feComposite in="color1" in2="blur1" operator="in" result="glowOuter"/>

      <feMorphology operator="dilate" radius="0.6" in="SourceAlpha" result="thick2"/>
      <feGaussianBlur in="thick2" stdDeviation="4" result="blur2"/>
      <feFlood flood-color="#00e5ff" flood-opacity="0.9" result="color2"/>
      <feComposite in="color2" in2="blur2" operator="in" result="glowInner"/>

      <feMerge>
        <feMergeNode in="glowOuter"/>
        <feMergeNode in="glowInner"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="dinoGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.2" result="blur"/>
      <feFlood flood-color="#7ee787" flood-opacity="0.65" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="panel">
      <rect x="0" y="0" width="1080" height="430" rx="14"/>
    </clipPath>

    <!-- One full terrain segment. It is repeated once for seamless scrolling. -->
    <g id="groundPattern" shape-rendering="crispEdges">
      <g fill="#30363d">
        <rect x="10" y="399" width="14" height="3"/>
        <rect x="78" y="399" width="10" height="3"/>
        <rect x="144" y="399" width="18" height="3"/>
        <rect x="235" y="399" width="11" height="3"/>
        <rect x="315" y="399" width="16" height="3"/>
        <rect x="402" y="399" width="9" height="3"/>
        <rect x="488" y="399" width="20" height="3"/>
        <rect x="575" y="399" width="12" height="3"/>
        <rect x="650" y="399" width="16" height="3"/>
        <rect x="758" y="399" width="10" height="3"/>
        <rect x="845" y="399" width="18" height="3"/>
        <rect x="930" y="399" width="13" height="3"/>
        <rect x="1012" y="399" width="20" height="3"/>
      </g>

      <!-- Chrome Dino-style cactus obstacle -->
      <g fill="#3fb950">
        <g transform="translate(710 369)">
          <rect x="14" y="0" width="8" height="33"/>
          <rect x="5" y="12" width="8" height="18"/>
          <rect x="0" y="12" width="6" height="6"/>
          <rect x="22" y="18" width="8" height="14"/>
          <rect x="30" y="18" width="6" height="6"/>
        </g>
      </g>
    </g>
  </defs>

  <g clip-path="url(#panel)">
    <rect x="0" y="0" width="1080" height="430" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

    <!-- intro line -->
    <text x="540" y="46" text-anchor="middle" font-size="22" fill="#8b949e">hi, I'm</text>

    <!-- glowing KEN -->
    <g filter="url(#neonGlow)" text-anchor="middle" font-size="26" fill="#eafcff">
      <animate attributeName="opacity" values="1;0.82;1" dur="2.6s" repeatCount="indefinite"/>
      <text x="540" y="110">██╗  ██╗███████╗███╗   ██╗</text>
      <text x="540" y="142">██║ ██╔╝██╔════╝████╗  ██║</text>
      <text x="540" y="174">█████╔╝ █████╗  ██╔██╗ ██║</text>
      <text x="540" y="206">██╔═██╗ ██╔══╝  ██║╚██╗██║</text>
      <text x="540" y="238">██║  ██╗███████╗██║ ╚████║</text>
      <text x="540" y="270">╚═╝  ╚═╝╚══════╝╚═╝  ╚═══╝</text>
    </g>

    <!-- ground line -->
    <line x1="15" y1="402" x2="1065" y2="402" stroke="#30363d" stroke-width="2"/>

    <!-- scrolling terrain -->
    <g id="scroller">
      <animateTransform
        attributeName="transform"
        type="translate"
        from="0 0"
        to="-1080 0"
        dur="3.2s"
        repeatCount="indefinite"
      />

      <use href="#groundPattern"/>
      <use href="#groundPattern" x="1080"/>
    </g>

    <!-- Chrome Dino-style animated runner -->
    <g id="dinoBase" filter="url(#dinoGlow)" transform="translate(88 291)" shape-rendering="crispEdges">
      <!-- automatic jump synced with the cactus loop -->
      <g id="jumpCycle">
        <animateTransform
          attributeName="transform"
          type="translate"
          values="0 0; 0 0; 0 -32; 0 -58; 0 -32; 0 0; 0 0"
          keyTimes="0; 0.42; 0.50; 0.58; 0.66; 0.75; 1"
          dur="3.2s"
          repeatCount="indefinite"
        />

        <g transform="scale(3)">
          <!-- tiny run bob, like the real idle-running Chrome dino -->
          <g>
            <animateTransform
              attributeName="transform"
              type="translate"
              values="0 0; 0 -0.7; 0 0"
              dur="0.32s"
              repeatCount="indefinite"
            />

            <!-- runner-style pixel dino silhouette -->
            <g fill="#7ee787">
              <!-- stepped tail -->
              <rect x="0" y="16" width="8" height="3"/>
              <rect x="5" y="18" width="9" height="3"/>
              <rect x="10" y="20" width="8" height="3"/>
              <rect x="14" y="22" width="6" height="3"/>

              <!-- torso and back -->
              <rect x="15" y="14" width="18" height="13"/>
              <rect x="18" y="11" width="14" height="5"/>
              <rect x="20" y="26" width="11" height="4"/>
              <rect x="27" y="10" width="6" height="10"/>

              <!-- squared head and long snout -->
              <rect x="32" y="1" width="14" height="5"/>
              <rect x="30" y="5" width="18" height="10"/>
              <rect x="39" y="12" width="9" height="4"/>
              <rect x="43" y="8" width="5" height="4"/>

              <!-- tiny bent arm -->
              <rect x="31" y="20" width="7" height="2"/>
              <rect x="36" y="22" width="2" height="3"/>
            </g>

            <!-- eye and mouth cutouts -->
            <rect x="37" y="5" width="2" height="2" fill="#0d1117"/>
            <rect x="42" y="13" width="6" height="2" fill="#0d1117"/>

            <!-- leg frame A -->
            <g fill="#7ee787">
              <animate
                attributeName="opacity"
                values="1;1;0;0"
                keyTimes="0;0.49;0.5;1"
                dur="0.32s"
                repeatCount="indefinite"
              />
              <rect x="18" y="29" width="4" height="7"/>
              <rect x="15" y="35" width="8" height="2"/>
              <rect x="29" y="29" width="4" height="5"/>
              <rect x="29" y="33" width="7" height="2"/>
            </g>

            <!-- leg frame B -->
            <g fill="#7ee787" opacity="0">
              <animate
                attributeName="opacity"
                values="0;0;1;1"
                keyTimes="0;0.49;0.5;1"
                dur="0.32s"
                repeatCount="indefinite"
              />
              <rect x="18" y="29" width="4" height="5"/>
              <rect x="18" y="33" width="7" height="2"/>
              <rect x="29" y="29" width="4" height="7"/>
              <rect x="27" y="35" width="8" height="2"/>
            </g>
          </g>
        </g>
      </g>
    </g>
  </g>
</svg>
