<svg viewBox="0 0 460 56" xmlns="http://www.w3.org/2000/svg" font-family="Menlo, Consolas, 'Courier New', monospace">
  <rect x="0" y="0" width="459" height="55" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <circle cx="20" cy="16" r="5" fill="#ED6A5E"/>
  <circle cx="38" cy="16" r="5" fill="#F4BF4F"/>
  <circle cx="56" cy="16" r="5" fill="#61C454"/>

  <g font-size="15" fill="#7ee787">
    <text x="20" y="42" opacity="0">$ npm run build — compiling.
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.1667;0.1677;1" dur="9s" begin="0s" repeatCount="indefinite"/>
    </text>

    <text x="20" y="42" opacity="0">$ npm run build — compiling..
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.1667;0.1677;0.3333;0.3343;1" dur="9s" begin="0s" repeatCount="indefinite"/>
    </text>

    <text x="20" y="42" opacity="0">$ npm run build — compiling...
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.3333;0.3343;0.5;0.501;1" dur="9s" begin="0s" repeatCount="indefinite"/>
    </text>

    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.5;0.501;1" dur="9s" begin="0s" repeatCount="indefinite"/>
      <text x="20" y="42">✓ compiled without errors — no warnings suppressed</text>
      <rect x="428" y="28" width="8" height="16" fill="#7ee787">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
